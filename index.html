<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dia das Mulheres</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌸 Feliz Dia das Mulheres Gatinha 🌸</h1>
    <p>Escuta essa <a href="https://www.youtube.com/watch?v=Jr6LyMe5BJo&list=RDJr6LyMe5BJo&start_radio=1">Musica</a> Coca Cola</p>
</header>

<div class="card">
    <h2>Mensagem Especial</h2>
    <p>
        Hoje celebramos todas as mulheres incríveis do mundo.
        Vocês inspiram e transformam o mundo todos os dias.
    </p>
    <button onclick="mostrarMensagem()">Ver mensagem</button>
    <p id="mensagem"></p>
</div>

<!-- Carrossel -->
<div class="carrossel">
    <img class="slide" src="imgs/img01.jpeg" alt="Imagem 1">
    <img class="slide" src="imgs/img02.jpeg" alt="Imagem 2">
    <img class="slide" src="imgs/img03.jpeg" alt="Imagem 3">

    <button class="anterior" onclick="mudarSlide(-1)">❮</button>
    <button class="proximo" onclick="mudarSlide(1)">❯</button>
</div>

<footer>
    <p>8 de Março - Dia Internacional das Mulheres</p>
</footer>

<script src="script.js"></script> <!-- Arquivo JS externo -->
</body>
</html>
